# ============================================================
# Classification Pipeline Configuration
# ============================================================

# --- LLM Server Settings ---
llm:
  base_url: "http://127.0.0.1:1234/v1"
  model_name: "ministral-3-3b"
  temperature: 0.0
  max_tokens: 32
  enable_thinking: true # Ministral has no thinking mode – leave false only for Qwen3

# --- Classification Settings ---
classification:
  labels:
    - "Autonomous Driving and UVs"
    - "Healthcare AI"
    - "Robotics and Industry"
    - "Research"
    - "Virtual assistants"
    - "Fintech and Marketing"
    - "Enterprise AI"
    - "Environmental AI"
    - "Generic use"
  default_label: "Generic use" # Fallback if model output can't be parsed
  description_column: "Descrizione"

# --- Prompt Template ---
# Available placeholders: {description}, {labels}
prompt:
  system: |
    You are a strict domain classifier for AI-related projects descriptions.
    Classify the input into EXACTLY ONE of the following 9 categories:

    1. Autonomous Driving and UVs – self-driving vehicles, ADAS, LiDAR, autonomous routing, unmanned vehicles of all types (ground, aerial, marine).
    2. Healthcare AI – medical imaging, diagnostics, drug discovery, biometric monitoring.
    3. Robotics and Industry – autonomous robots, LLM-powered robotic systems, industrial arms, factory automation, computer vision for production lines, predictive maintenance, safety monitoring systems.
    4. Research – theoretical research, new architectures, academic papers, pure mathematical optimization.
    5. Virtual assistants – chatbots, LLM-based conversational agents, voice assistants for customer service.
    6. Fintech and Marketing – algorithmic trading, fraud detection, credit scoring, robo-advising, AI-generated advertising, GenAI for marketing campaigns, personalised content creation.
    7. Enterprise AI – specifically targeting internal business processes, HR tech, supply chain or CRM/ERP integrations.
    8. Environmental AI – specific use case of AI and data analysis, and also IoT, to monitor and evaluate environment parameters or pollution.
    9. Generic use – AI applications that do not clearly fit any of the above categories.

    You MUST respond with EXACTLY one of the following labels: {labels}
    Do NOT include any other text, explanation, or punctuation.
  user: |
    Classify the following description:
    "{description}"

# --- I/O Paths (relative to project root) ---
paths:
  input_dir: "app/data"
  output_dir: "app/out"

# --- Concurrency ---
concurrency:
  max_workers: 4 # Max parallel requests to LM Studio
  batch_log_interval: 100 # Log progress every N items
