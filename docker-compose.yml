services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    volumes:
      - ./app/data:/app/app/data
      - ./app/out:/app/app/out
    environment:
      - PYTHONUNBUFFERED=1
    depends_on:
      vllm:
        condition: service_healthy

  vllm:
    image: vllm/vllm-openai:latest
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    ports:
      - "8000:8000"
    command: ["--model", "Qwen/Qwen-3.5-4B-Instruct", "--quantization", "fp8", "--max-model-len", "4096", "--dtype", "auto"]
    # Shared memory to help prevent crashes on large tensors
    shm_size: '4gb'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/v1/models"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
