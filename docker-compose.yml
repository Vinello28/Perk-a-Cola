services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    volumes:
      - ./app/data:/app/app/data
      - ./app/out:/app/app/out
    environment:
      - PYTHONUNBUFFERED=1
    depends_on:
      ollama-pull:
        condition: service_completed_successfully

  ollama:
    image: ollama/ollama:latest
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  ollama-pull:
    image: ollama/ollama:latest
    entrypoint: ["ollama", "pull", "qwen3:4b"]
    environment:
      - OLLAMA_HOST=http://ollama:11434
    depends_on:
      ollama:
        condition: service_healthy
    restart: "no"

volumes:
  ollama_data:
